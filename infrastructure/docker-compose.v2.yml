version: '3.8'

services:

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data

  copy-engine:
    build:
      context: ../copy-trading
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      MT5_SERVER:   ${MT5_SERVER}
      MT5_PORT:     ${MT5_PORT:-443}
      MT5_LOGIN:    ${MT5_LOGIN}
      MT5_PASSWORD: ${MT5_PASSWORD}
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      REDIS_PASS:   ${REDIS_PASSWORD:-}
    depends_on:
      - redis

  # Backend runs separately (existing V1 deploy)
  # Just make sure it points to this Redis instance

volumes:
  redis_data:
